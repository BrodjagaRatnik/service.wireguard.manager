name: 🐛 Bug Report
description: Report a bug or connection loop in the WireGuard Manager add-on.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue! Please fill out this form as accurately as possible to help us squash the bug.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Pre-Flight Checklist
      description: Please confirm you have completed these steps before opening an issue.
      options:
        - label: I have updated the add-on to the latest release (`v1.4.0~rc4` or newer).
          required: true
        - label: I ran the **`regen`** command in settings after upgrading.
          required: true
        - label: I am NOT posting full raw logs directly into this issue description.
          required: true

  - type: dropdown
    id: hardware
    attributes:
      label: 🖥️ Hardware & Platform Environment
      description: Which device are you running the add-on on?
      options:
        - "Raspberry Pi 5"
        - "Raspberry Pi 4"
        - "X86_64 Generic PC"
        - "Other ARM Device"
    validations:
      required: true

  - type: dropdown
    id: os_version
    attributes:
      label: 💿 Operating System / LibreELEC Version
      options:
        - "LibreELEC 12 (Kodi 21 Omega)"
        - "LibreELEC 11 (Kodi 20 Nexus)"
        - "CoreELEC (Kodi 21 Omega)"
        - "Other / Custom Linux Build"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: 🌐 Active VPN Provider
      description: Which provider configuration is experiencing the bug?
      options:
        - "Private Internet Access (PIA)"
        - "NordVPN"
        - "Custom (.config/.conf file)"
    validations:
      required: true

  - type: input
    id: slot_number
    attributes:
      label: 🎛️ Mapping Slot Affected
      description: Which slot index (1 to 8) and which video add-on triggered the issue? (e.g., Slot 3 - ARD/ZDF)
      placeholder: "e.g., Slot 1 - iPlayer"
    validations:
      required: false

  - type: input
    id: log_link
    attributes:
      label: 📋 Filtered Log Pastebin Link
      description: |
        Run this command via SSH: `grep -i "service.wireguard.manager" /storage/.kodi/temp/kodi.log | pastebinit`
        Paste the generated link below.
      placeholder: "https://ubuntu.com or https://kodi.tv"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 Bug Description & Steps to Reproduce
      description: Clear and concise description of what went wrong (e.g., loop log, timeout details, speed drops).
      placeholder: "1. Opened video plugin X... 2. Log shows loop switching... 3. Disconnected automatically after 5 seconds..."
    validations:
      required: true
