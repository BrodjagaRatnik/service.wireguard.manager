name: Kodi Addon Check & Lint

on: [push, pull_request]

jobs:
  kodi-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linter
        run: pip install flake8

      - name: Run Python Lint (flake8)
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings (useful if you have many old style issues)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Kodi Addon Checker
        uses: xbmc/action-kodi-addon-checker@master
        with:
          kodi-version: omega
          addon-id: service.wireguard.manager
