name: Kodi Addon Checker

on: [push, pull_request]

env:
  # Opt into Node.js 24 to remove deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  kodi-addon-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Kodi addon checker
        uses: xbmc/action-kodi-addon-checker@master
        with:
          # Changed 'addon-path' to 'addon-id'
          # Use "." if your addon.xml is in the root of the repo
          addon-id: .
          kodi-version: omega
