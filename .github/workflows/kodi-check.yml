name: Kodi Addon Checker

on: [push, pull_request]

jobs:
  kodi-addon-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Kodi addon checker
        uses: xbmc/action-kodi-addon-checker@master
        with:
          addon-path: .
          kodi-version: omega
